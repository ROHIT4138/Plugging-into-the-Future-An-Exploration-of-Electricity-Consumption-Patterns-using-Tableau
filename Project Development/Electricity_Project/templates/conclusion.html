<!DOCTYPE html>
<html>
<head>
    <title>Visualizations - Electricity Analytics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Segoe UI, sans-serif;
        }

        body{
            background:#f4f6f9;
            overflow:hidden; /* No scrolling */
        }

        .navbar{
            height:60px;
            background:#e5e7eb;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 40px;
        }

        .nav-links a{
            margin-left:20px;
            text-decoration:none;
            color:#374151;
            font-weight:500;
        }

        .nav-links a.active{
            color:#2563eb;
        }

        .main{
            height:calc(100vh - 60px);
            display:flex;
            flex-direction:column;
            justify-content:center;
            padding:40px 80px;
            animation: fadeIn 1.2s ease-in-out;
        }

        .title{
            text-align:center;
            font-size:30px;
            font-weight:600;
            color:#1f2937;
        }

        .underline{
            width:60px;
            height:3px;
            background:#2563eb;
            margin:10px auto 40px;
            border-radius:5px;
        }

        .content{
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .chart img{
            width:100%;
            max-width:1100px;
            height:70vh;
            object-fit:contain;
            border-radius:10px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
            animation: zoomIn 1.2s ease;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity:0; }
            to { opacity:1; }
        }

        @keyframes zoomIn {
            from { transform:scale(0.9); opacity:0; }
            to { transform:scale(1); opacity:1; }
        }

        @media(max-width:1000px){
            .main{
                padding:20px;
            }
        }

    </style>
</head>

<body>

<div class="navbar">
    <div><strong>⚡ Electricity Analytics</strong></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/story">Story</a>
        <a href="/visualizations" class="active">Visualizations</a>
        <a href="/conclusion">Conclusion</a>
    </div>
</div>

<div class="main">

    <div class="title">Electricity Consumption Visualizations</div>
    <div class="underline"></div>

    <div class="content">
        <div class="chart">
            <img src="{{ url_for('static', filename='images/visualization.png') }}" 
                 alt="Electricity Visualization">
        </div>
    </div>

</div>

</body>
</html>
