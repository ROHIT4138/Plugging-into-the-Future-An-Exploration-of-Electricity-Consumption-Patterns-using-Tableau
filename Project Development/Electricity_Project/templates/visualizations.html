<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Electricity Consumption Visualizations</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* No scrolling */
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
        }

        .container {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 1.5s ease-in-out;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 32px;
            letter-spacing: 1px;
        }

        .image-box {
            width: 95%;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            animation: zoomIn 1.5s ease;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 18px;
            background: white;
            color: #1e3c72;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

    </style>
</head>

<body>

    <button class="back-btn" onclick="window.location.href='/'">Home</button>

    <div class="container">
        <h1>Electricity Consumption Dashboard Visualizations</h1>

        <div class="image-box">
            <img src="{{ url_for('static', filename='images/visualization.png') }}" 
                 alt="Electricity Consumption Visualization">
        </div>
    </div>

</body>
</html>
